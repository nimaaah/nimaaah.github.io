<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Nima Hemati — mechanical engineering graduate (M.Sc. in progress); technical program and product-oriented experience across robotics, systems, and regulated delivery."
    />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'; frame-ancestors 'none'; upgrade-insecure-requests"
    />
    <title>Nima Hemati</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="ambient" aria-hidden="true">
      <div class="ambient-orb ambient-orb--a"></div>
      <div class="ambient-orb ambient-orb--b"></div>
      <div class="ambient-grid"></div>
    </div>

    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header">
      <a class="brand" href="#top" aria-label="Home">NH</a>
      <div class="nav-list-wrap" id="nav-list-wrap">
        <nav aria-label="Primary">
          <ul class="nav-list">
            <li><a href="#profile">Profile</a></li>
            <li><a href="#skills">Skills</a></li>
            <li><a href="#portfolio">Portfolio</a></li>
            <li><a href="#experience">Experience</a></li>
            <li><a href="#education">Education</a></li>
            <li><a href="#volunteer">Volunteering</a></li>
          </ul>
        </nav>
      </div>
      <div class="header-end">
        <button type="button" class="nav-toggle" id="nav-toggle" aria-expanded="false" aria-controls="nav-list-wrap" aria-label="Open menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div class="header-actions">
          <a class="btn btn-primary" id="pdf-link" href="Nima_Hemati_CV.pdf" download>CV</a>
        </div>
      </div>
    </header>

    <main id="main">
      <div class="hero-stack" id="top">
        <div class="hero-intro">
          <div class="headshot-frame">
            <img
              class="headshot"
              id="headshot"
              src="assets/images/headshot.png"
              width="512"
              height="512"
              decoding="async"
              fetchpriority="high"
              alt=""
            />
          </div>
          <section class="hero" aria-labelledby="hero-name">
            <p class="hero-eyebrow">Systems · Delivery · Product</p>
            <h1 id="hero-name"></h1>
            <p class="hero-title-line" id="hero-title"></p>
            <p class="hero-lead" id="hero-tagline"></p>
            <div class="contact-chips" id="contact-chips"></div>
          </section>
        </div>

        <section id="profile" class="profile-float" aria-labelledby="profile-heading">
          <span class="section-kicker" id="profile-heading">About</span>
          <p class="profile-text" id="profile-text"></p>
        </section>
      </div>

      <section id="skills" class="section-tight" aria-labelledby="skills-heading">
        <div class="section-head">
          <span class="section-kicker" id="skills-heading">Capabilities</span>
        </div>
        <div class="skill-bento" id="skill-grid"></div>
      </section>

      <section id="portfolio" class="section-tight" aria-labelledby="portfolio-heading">
        <div class="section-head">
          <span class="section-kicker" id="portfolio-heading"></span>
        </div>
        <p class="section-dek" id="portfolio-intro" hidden></p>
        <article class="skill-card portfolio-marquee-outer" id="portfolio-shell">
          <div
            class="portfolio-marquee"
            role="region"
            aria-label="Portfolio gallery"
            aria-roledescription="carousel"
          >
            <div class="portfolio-marquee-track" id="portfolio-track"></div>
          </div>
        </article>
      </section>

      <section id="experience" class="section-tight" aria-labelledby="experience-heading">
        <div class="section-head">
          <span class="section-kicker" id="experience-heading">Experience</span>
        </div>
        <div class="exp-list" id="timeline-exp"></div>
      </section>

      <section id="education" class="section-tight" aria-labelledby="education-heading">
        <div class="section-head">
          <span class="section-kicker" id="education-heading">Education</span>
        </div>
        <div class="edu-overlap" id="education-blocks"></div>
      </section>

      <section id="volunteering" class="section-tight" aria-labelledby="volunteer-heading">
        <div class="section-head">
          <span class="section-kicker" id="volunteer-heading">Volunteering</span>
        </div>
        <div class="exp-list" id="timeline-vol"></div>
      </section>
    </main>

    <footer class="site-footer">
      <p>Private host · CV-backed · <span id="year"></span></p>
    </footer>

    <script src="content.js"></script>
    <script src="app.js"></script>
  </body>
</html>
